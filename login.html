<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - e-Khedut</title>
</head>
<body style="background-color: #f1f8e9;">

  <!-- Header -->
   <header style="background-color: #c9a227; padding: 15px; color: 2c2416;">
    <h2 style="display: inline-flex; align-items: center; gap: 8px; margin: 0;">
      <svg width="100" height="100" viewBox="0 0 100 100">
             <line x1="30" y1="10" x2="30" y2="90" stroke="white" stroke-width="8"/>
             <line x1="30" y1="50" x2="70" y2="10" stroke="white" stroke-width="8"/>
             <line x1="30" y1="50" x2="70" y2="90" stroke="white" stroke-width="8"/>
      </svg>
      e - Khedut
    </h2>
    <nav style="float: right; margin-top: 50px;">
      <a href="index.html" style="color:#2c2416; margin: 0 10px; text-decoration: none;">Home</a>
      <a href="marketplace.html" style="color:#2c2416; margin: 0 10px; text-decoration: none;">Marketplace</a>
      <a href="dashboard.html" style="color:#2c2416; margin: 0 10px; text-decoration: none; ">Dashboard</a>
      <a href="about.html" style="color:#2c2416; margin: 0 10px; text-decoration: none; ">About</a>
      <a href="contact.html" style="color:#2c2416; margin: 0 10px; text-decoration: none;">Contact</a>
      <a href="login.html" style="background-color: #00bbff; color:black; margin: 0 10px; padding: 4px 10px; text-decoration: none;">Login</a>
      <a href="register.html" style="background-color: #faf6ed ;color:black; margin: 0 10px; padding: 4px 10px; text-decoration: none;">Register</a>
    </nav>
    <div style="clear: both;"></div>
  </header>

  <!-- Login Form -->
  <div style="max-width: 400px; margin: 60px auto; background: white; padding: 30px; border: 1px solid #ccc;">
    <h2 style="text-align: center; color: #c9a227;">Login to e-Khedut</h2>
    <p style="text-align: center;">Don't have an account? <a href="register.html">Register here</a></p>
    <br>

    <form onsubmit="window.location.href='dashboard.html'; return false;">
      <label>Email or Phone Number:</label><br>
      <input type="text" placeholder="Enter your email or phone" style="width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; box-sizing: border-box;"><br>

      <label>Password:</label><br>
      <input type="password" id="password" placeholder="Enter your password" style="width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; box-sizing: border-box;"><br>

      <input type="checkbox" id="showPass" onclick="document.getElementById('password').type = this.checked ? 'text' : 'password'">
      <label for="showPass">Show Password</label>

      <br><br>
      <input type="checkbox"> Remember me &nbsp;&nbsp;&nbsp;
      <a href="#">Forgot password?</a>

      <br><br>
      <input type="submit" value="Sign In" style="width: 100%; background-color: #c9a227; color: white; padding: 12px; border: none; font-size: 16px; cursor: pointer;">
    </form>

    <br>
    <p style="text-align: center; color: #2c2416;">By signing in, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
  </div>

  <!-- Footer -->
  <footer style="background-color: #5c4a1f; color: white; padding: 20px; text-align: center; margin-top: 40px;">
    <p style="color: rgba(255, 255, 255, 0.5);">© 2026 e-Khedut. All rights reserved.</p>
  </footer>

</body>
</html>
